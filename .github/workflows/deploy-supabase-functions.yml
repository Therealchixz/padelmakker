name: Deploy Supabase Functions

on:
  push:
    branches:
      - main
    paths:
      - supabase/functions/**
      - .github/workflows/deploy-supabase-functions.yml
  workflow_dispatch:

concurrency:
  group: supabase-functions-deploy-main
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Deploy all Supabase Edge Functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
        run: |
          if [ -z "${SUPABASE_ACCESS_TOKEN}" ]; then
            echo "::error::Missing GitHub secret SUPABASE_ACCESS_TOKEN (Settings -> Secrets and variables -> Actions)"
            exit 1
          fi

          PROJECT_REF="${SUPABASE_PROJECT_REF:-hzmrsqrerkoftcppfklu}"
          echo "Deploying functions to project: ${PROJECT_REF}"

          shopt -s nullglob
          function_dirs=(supabase/functions/*)
          if [ ${#function_dirs[@]} -eq 0 ]; then
            echo "No functions found in supabase/functions"
            exit 0
          fi

          for dir in "${function_dirs[@]}"; do
            if [ -d "${dir}" ]; then
              fn_name="$(basename "${dir}")"
              echo "Deploying ${fn_name}..."
              npx supabase@latest functions deploy "${fn_name}" --project-ref "${PROJECT_REF}"
            fi
          done

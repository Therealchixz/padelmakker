name: Auto-merge cursor PRs

# Merger cursor/* PRs til main når CI er grøn, så Vercel deployer frontend automatisk.
# Kræver: Settings → Actions → General → Workflow permissions → Read and write.

on:
  check_suite:
    types: [completed]
  pull_request:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    runs-on: ubuntu-latest
    if: github.repository == 'Therealchixz/padelmakker' || github.repository == 'therealchixz/padelmakker'
    steps:
      - name: Merge when checks pass
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            let prNumber = null;
            if (context.payload.pull_request) {
              prNumber = context.payload.pull_request.number;
            } else if (context.payload.check_suite?.pull_requests?.length) {
              prNumber = context.payload.check_suite.pull_requests[0].number;
            }
            if (!prNumber) {
              core.info('No PR linked to this event — skip.');
              return;
            }

            if (context.eventName === 'check_suite') {
              const conclusion = context.payload.check_suite.conclusion;
              if (conclusion !== 'success') {
                core.info(`Check suite ${conclusion} — skip merge.`);
                return;
              }
            }

            const { data: pr } = await github.rest.pulls.get({ owner, repo, pull_number: prNumber });
            if (pr.merged || pr.state !== 'open') return;
            if (pr.draft) {
              core.info('PR is draft — skip.');
              return;
            }
            if (pr.base.ref !== 'main') {
              core.info(`Base branch ${pr.base.ref} — skip.`);
              return;
            }

            const headRef = pr.head.ref || '';
            const labels = (pr.labels || []).map((l) => l.name);
            const allow =
              headRef.startsWith('cursor/') ||
              labels.includes('auto-merge');
            if (!allow) {
              core.info(`PR ${headRef} without auto-merge label — skip.`);
              return;
            }

            try {
              await github.rest.pulls.merge({
                owner,
                repo,
                pull_number: prNumber,
                merge_method: 'merge',
              });
              core.info(`Merged PR #${prNumber} (${headRef}).`);
            } catch (err) {
              core.warning(`Merge failed for PR #${prNumber}: ${err.message}`);
            }

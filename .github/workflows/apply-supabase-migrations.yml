name: Apply Supabase migrations

on:
  push:
    branches:
      - main
    paths:
      - supabase/migrations/**
      - supabase/config.toml
      - .github/workflows/apply-supabase-migrations.yml
  workflow_dispatch:

concurrency:
  group: supabase-migrations-main
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Push pending migrations to Supabase
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [ -z "${SUPABASE_ACCESS_TOKEN}" ]; then
            echo "::error::Missing GitHub secret SUPABASE_ACCESS_TOKEN"
            exit 1
          fi

          PROJECT_REF="${{ vars.SUPABASE_PROJECT_REF }}"
          PROJECT_REF="${PROJECT_REF:-hzmrsqrerkoftcppfklu}"
          echo "Applying migrations to project ${PROJECT_REF}"

          if [ ! -d supabase/migrations ] || [ -z "$(ls -A supabase/migrations/*.sql 2>/dev/null || true)" ]; then
            echo "No migration files — nothing to apply."
            exit 0
          fi

          npx supabase@latest db push --project-ref "${PROJECT_REF}" --yes

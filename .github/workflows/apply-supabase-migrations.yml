name: Apply Supabase migrations

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: supabase-migrations-main
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Check migration drift (repo vs prod)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
        continue-on-error: true
        run: node scripts/check-migration-drift.mjs --repair-hint

      - name: Push pending migrations to Supabase
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [ -z "${SUPABASE_ACCESS_TOKEN}" ]; then
            echo "::error::Missing GitHub secret SUPABASE_ACCESS_TOKEN"
            exit 1
          fi

          PROJECT_REF="${{ vars.SUPABASE_PROJECT_REF }}"
          PROJECT_REF="${PROJECT_REF:-hzmrsqrerkoftcppfklu}"
          echo "Applying migrations to project ${PROJECT_REF}"

          if [ ! -d supabase/migrations ] || [ -z "$(ls -A supabase/migrations/*.sql 2>/dev/null || true)" ]; then
            echo "No migration files — nothing to apply."
            exit 0
          fi

          npx supabase@latest link --project-ref "${PROJECT_REF}" --yes
          npx supabase@latest db push --linked --yes
